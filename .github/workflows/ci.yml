name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dummy .env
        run: |
          echo "OPENAI_API_KEY=dummy" >> .env
          echo "NEWS_API_KEY=dummy" >> .env

      - name: Run tests
        run: pytest tests/ -v